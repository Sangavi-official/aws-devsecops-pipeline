# Continuous compliance scan of the LIVE AWS account with Prowler,
# graded against the CIS AWS Foundations Benchmark.
# Runs on demand (workflow_dispatch). Uses a read-only role
# (AWS-managed SecurityAudit + ViewOnlyAccess policies) via OIDC.

name: prowler-cis-scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prowler:
    name: Prowler CIS scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Get temporary read-only AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: arn:aws:iam::634670495126:role/github-actions-prowler
          aws-region: ap-south-1
      - name: Install Prowler
        run: pip install prowler==5.32.1
      - name: List available CIS frameworks (for reference)
        run: prowler aws --list-compliance | grep -i cis || true
      - name: Run Prowler against CIS benchmark
        run: |
          prowler aws \
            --compliance cis_4.0_aws \
            --output-directory prowler-output \
            --output-filename prowler-report \
            -z
      - name: Compute CIS score
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import csv, glob

          files = glob.glob("prowler-output/compliance/*cis*4.0*.csv") or glob.glob("prowler-output/compliance/*cis*.csv")
          f = files[0]
          with open(f, newline="", encoding="utf-8") as fh:
              sample = fh.read(4096)
              fh.seek(0)
              delim = ";" if sample.count(";") > sample.count(",") else ","
              rows = list(csv.DictReader(fh, delimiter=delim))
          status_col = "STATUS"
          passed = sum(1 for r in rows if r[status_col].strip().upper() == "PASS")
          failed = sum(1 for r in rows if r[status_col].strip().upper() == "FAIL")
          total = passed + failed
          print("### Prowler CIS AWS Foundations Benchmark")
          print()
          print(f"- Source file: `{f}`")
          print(f"- PASS: **{passed}**")
          print(f"- FAIL: **{failed}**")
          if total:
              print(f"- Score: **{passed / total * 100:.1f}%** of scored checks passing")
          PY
      - name: Upload full report as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prowler-report
          path: prowler-output/
