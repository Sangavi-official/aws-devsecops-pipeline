# Shift-left pipeline:
#   1. Checkov scans the Terraform code for security mistakes
#   2. gitleaks scans the whole git history for leaked secrets
#   3. Only if BOTH pass does Terraform deploy to AWS,
#      using short-lived OIDC credentials (no stored AWS keys).
#
# Every third-party action is pinned to a full commit SHA, not a tag.
# Tags can be moved to point at malicious code (as happened in the
# Trivy release-infrastructure compromise, March 2026); SHAs cannot.

name: shift-left-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkov:
    name: IaC scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install Checkov
        run: pip install checkov==3.3.7
      - name: Scan Terraform
        run: checkov -d terraform --compact

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so old commits are scanned too
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Terraform deploy (OIDC)
    needs: [checkov, gitleaks]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # allows this job to request an OIDC token
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - name: Get temporary AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: arn:aws:iam::634670495126:role/github-actions-deploy
          aws-region: ap-south-1
      - name: Terraform init
        run: terraform -chdir=terraform init -input=false
      - name: Terraform validate
        run: terraform -chdir=terraform validate
      - name: Terraform plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan
      - name: Terraform apply
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan
      - name: Show API URL
        run: |
          echo "### Deployed API" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$(terraform -chdir=terraform output -raw api_url)\`" >> "$GITHUB_STEP_SUMMARY"
